services:
  postgres:
    image: postgres:16
    container_name: unichase-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: unichase
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
